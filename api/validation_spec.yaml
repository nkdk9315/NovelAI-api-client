# NovelAI Client Validation Specification
# バリデーション仕様書
#
# このファイルは novelai_client.py の関数・引数をまとめたものです。
# 各パラメータにバリデーションルールを追記し、Pydanticモデルへの
# リファクタリングの設計ドキュメントとして使用します。
#
# 使い方:
# 1. 各パラメータの validation セクションにルールを記述
# 2. このファイルを元にPydanticモデルを自動生成 or 手動実装
#
# 凡例:
#   type: Python型
#   default: デフォルト値（nullの場合は必須パラメータ）
#   validation: バリデーションルール（追記用）

# =============================================================================
# トークンカウント（プロンプトバリデーション用）
# =============================================================================
#
# NovelAIのプロンプトは文字数ではなくトークン数で制限される（最大512トークン）
#
# ⚠️ 調査結果:
#   1. POST /oa/v1/internal/token-count は公開APIでは利用不可
#   2. NovelAIはクライアントサイドでトークン化している（API呼び出しなし）
#   3. 標準CLIPトークナイザー(openai/clip-vit-large-patch14)と公式の値が一致しない
#      - 例: "girl, 2::liko (pokemon)..." → 公式25トークン, CLIP32トークン
#   4. NovelAI独自の重み構文（::）の処理方法が不明
#
# 🔧 実装方針（近似値を使用）:
#   完全一致は困難なため、以下のいずれかで対応:
#
#   案1: CLIPトークナイザーで近似（やや厳しめ）
#     from transformers import CLIPTokenizer
#     tokenizer = CLIPTokenizer.from_pretrained("openai/clip-vit-large-patch14")
#     # 公式より多めにカウントされるので、安全マージンを取る
#
#   案2: バリデーションを緩くする（512トークン制限を文字数に換算）
#     # 目安: 1トークン ≒ 4文字（英語の場合）
#     # 512トークン ≒ 2000文字くらい
#     max_chars: 2000
#
#   案3: サーバーエラーに任せる
#     # バリデーションせず、APIからのエラーをそのまま返す
#
# 💡 参考: NovelAIの重み構文
#   - 2::tag::  → 重み2でtag
#   - -1::tag:: → 重み-1（ネガティブ）でtag
#   - 重み構文自体がトークンを消費するかは不明

---
# =============================================================================
# データクラス（Pydanticモデルに変換予定）
# =============================================================================

dataclasses:

  # ---------------------------------------------------------------------------
  CharacterConfig:
    description: |
      キャラクター設定
      マルチキャラクター生成時に各キャラクターの位置とプロンプトを指定する
    
    fields:
      prompt:
        type: str
        required: true
        description: キャラクターのプロンプト（例: "1girl, blonde hair, blue eyes"）
        validation:
          min_length: 1  # 空文字列は不可
          max_chars: 2000  # 文字数制限（512トークン×4文字の目安）
      
      center_x:
        type: float
        default: 0.5
        description: キャラクターのX座標（左が0、右が1）
        validation:
          ge: 0.0  # 以上
          le: 1.0  # 以下
      
      center_y:
        type: float
        default: 0.5
        description: キャラクターのY座標（上が0、下が1）
        validation:
          ge: 0.0
          le: 1.0
      
      negative_prompt:
        type: str
        default: ""
        description: キャラクター固有のネガティブプロンプト
        validation:
          max_chars: 2000  # 文字数制限（空文字列OK）


  # ---------------------------------------------------------------------------
  CharacterReferenceConfig:
    description: |
      キャラクター参照設定（Director Reference）
      参照画像からキャラクターの特徴を抽出して生成に反映する
    
    fields:
      image:
        type: Union[str, Path, bytes]
        required: true
        description: 参照画像（ファイルパス、バイトデータ、またはBase64文字列）
        validation:
          # ファイルパスの場合: 存在チェック
          # バイトの場合: 有効な画像フォーマットチェック
          formats: [png, jpeg, jpg, webp]
          # 参照画像は大きくてもOKだが、現実的な制限を設ける
          max_file_size_mb: 10  # 10MB以下
          max_dimension: 4096   # 幅・高さ各4096ピクセル以下
      
      fidelity:
        type: float
        default: 1.0
        description: 忠実度（キャラクターの反映度）
        validation:
          ge: 0.0
          le: 1.0
      
      include_style:
        type: bool
        default: true
        description: 絵柄も参照するか（true: character&style, false: character only）
        validation: null  # bool値のみ

  # ---------------------------------------------------------------------------
  VibeEncodeResult:
    description: |
      Vibeエンコード結果
      encode_vibe()の戻り値、DB保存にも対応
    
    fields:
      encoding:
        type: str
        required: true
        description: Base64エンコードされたVibeデータ
        validation:
          min_length: 1
      
      model:
        type: str
        required: true
        description: 使用モデル
        validation:
          enum:
            - nai-diffusion-4-curated-preview
            - nai-diffusion-4-full
            - nai-diffusion-4-5-curated
            - nai-diffusion-4-5-full
      
      information_extracted:
        type: float
        required: true
        description: 情報抽出量
        validation:
          ge: 0.0
          le: 1.0
      
      strength:
        type: float
        required: true
        description: 推奨Vibe強度
        validation:
          ge: 0.0
          le: 1.0
      
      source_image_hash:
        type: str
        required: true
        description: 元画像のSHA256ハッシュ（重複検出用）
        validation:
          pattern: "^[a-f0-9]{64}$"  # SHA256ハッシュ形式
      
      created_at:
        type: datetime
        required: true
        description: 作成日時
        validation: null
      
      saved_path:
        type: Optional[Path]
        default: null
        description: 保存したファイルパス（保存した場合）
        validation: null
      
      anlas_remaining:
        type: Optional[int]
        default: null
        description: 残りアンラス
        validation:
          ge: 0
      
      anlas_consumed:
        type: Optional[int]
        default: null
        description: 今回消費したアンラス
        validation:
          ge: 0

  # ---------------------------------------------------------------------------
  GenerateResult:
    description: |
      画像生成結果
      generate()の戻り値
    
    fields:
      image_data:
        type: bytes
        required: true
        description: 生成された画像のバイトデータ
        validation:
          min_length: 1
      
      seed:
        type: int
        required: true
        description: 使用されたシード値
        validation:
          ge: 0
          le: 4294967295  # 2^32 - 1
      
      anlas_remaining:
        type: Optional[int]
        default: null
        description: 残りアンラス
        validation:
          ge: 0
      
      anlas_consumed:
        type: Optional[int]
        default: null
        description: 今回消費したアンラス
        validation:
          ge: 0
      
      saved_path:
        type: Optional[Path]
        default: null
        description: 保存先パス（保存した場合）
        validation: null

# =============================================================================
# NovelAIClient メソッド
# =============================================================================

methods:

  # ---------------------------------------------------------------------------
  __init__:
    description: NovelAIClient初期化
    
    parameters:
      api_key:
        type: Optional[str]
        default: null
        description: NovelAI API Key。指定しない場合は環境変数 NOVELAI_API_KEY から取得
        validation:
          # 必須（環境変数からも取得不可なら例外）
          pattern: "^pst-.*"  # "pst-" で始まる

  # ---------------------------------------------------------------------------
  get_anlas_balance:
    description: 残りアンラス（Training Steps）を取得
    
    parameters: {}  # パラメータなし
    
    returns:
      type: dict
      fields:
        fixed:
          type: int
          description: サブスクリプション付随のアンラス残量
        purchased:
          type: int
          description: 追加購入したアンラス残量
        total:
          type: int
          description: 合計アンラス残量
        tier:
          type: int
          description: サブスクリプションプラン (0:なし, 1:Tablet, 2:Scroll, 3:Opus)

  # ---------------------------------------------------------------------------
  encode_vibe:
    description: |
      画像をVibe Transfer用にエンコード
      2 Anlas消費
    
    parameters:
      image:
        type: Union[str, Path, bytes]
        required: true
        description: 画像ファイルパス、バイトデータ、またはBase64文字列
        validation:
          formats: [png, jpeg, jpg, webp]
          # TODO: 最大ファイルサイズ/解像度
      
      model:
        type: str
        default: "nai-diffusion-4-5-full"
        description: 使用するモデル名
        validation:
          enum:
            - nai-diffusion-4-curated-preview
            - nai-diffusion-4-full
            - nai-diffusion-4-5-curated
            - nai-diffusion-4-5-full
      
      information_extracted:
        type: float
        default: 0.7
        description: 抽出する情報量
        validation:
          ge: 0.0
          le: 1.0
      
      strength:
        type: float
        default: 0.7
        description: Vibe Transferの推奨強度
        validation:
          ge: 0.0
          le: 1.0
      
      save_path:
        type: Optional[Union[str, Path]]
        default: null
        description: 保存先ファイルパス（指定時のみ保存）
        validation: null
      
      save_dir:
        type: Optional[Union[str, Path]]
        default: null
        description: 保存先ディレクトリ（自動ファイル名で保存）
        validation: null
    
    returns:
      type: VibeEncodeResult
      description: エンコード結果（DB保存対応）

  # ---------------------------------------------------------------------------
  generate:
    description: |
      統合画像生成メソッド
      テキストからの画像生成、img2img、マルチキャラクター、Vibe Transferすべて対応
    
    parameters:
      
      # --- 基本プロンプト ---
      prompt:
        type: str
        required: true
        description: |
          生成プロンプト
          - キャラクターなしの場合: メインプロンプト
          - キャラクターありの場合: 背景・シーンプロンプト
        validation:
          min_length: 1
          max_chars: 2000  # 文字数制限（512トークン×4文字の目安）
      
      # --- Action & Image2Image ---
      action:
        type: Literal["generate", "img2img"]
        default: "generate"
        description: 生成アクション
        validation:
          enum: [generate, img2img]
      
      source_image:
        type: Optional[Union[str, Path, bytes]]
        default: null
        description: img2img用の入力画像
        validation:
          # action が "img2img" の場合は必須
          required_if:
            action: img2img
          formats: [png, jpeg, jpg, webp]
      
      img2img_strength:
        type: float
        default: 0.62
        description: img2img変換強度（低いほど元画像に近い）
        validation:
          ge: 0.0
          le: 1.0
      
      img2img_noise:
        type: float
        default: 0.0
        description: img2imgノイズ量
        validation:
          ge: 0.0
          le: 1.0
      
      # --- キャラクター設定 ---
      characters:
        type: Optional[List[CharacterConfig]]
        default: null
        description: キャラクター設定のリスト（位置・個別プロンプト）
        validation:
          max_length: 6  # 最大6キャラクター
      
      # --- Vibe Transfer ---
      vibes:
        type: Optional[List[Union[str, Path, VibeEncodeResult]]]
        default: null
        description: Vibeリスト（.naiv4vibeパス、エンコード文字列、VibeEncodeResult）
        validation:
          max_length: 10  # 最大10 Vibe（5以上は1Vibeあたり2Anlas消費）
          # character_referenceとの併用不可
          mutex_with: character_reference
      
      vibe_strengths:
        type: Optional[List[float]]
        default: null  # vibesと同じ長さでデフォルト0.7
        description: 各Vibeの強度
        validation:
          each:
            ge: 0.0
            le: 1.0
          # vibesと同じ長さでなければならない
          length_equals: vibes
      
      vibe_info_extracted:
        type: Optional[List[float]]
        default: null
        description: 各Vibeのinformation_extracted値
        validation:
          each:
            ge: 0.0
            le: 1.0
          length_equals: vibes
      
      # --- Character Reference ---
      character_reference:
        type: Optional[CharacterReferenceConfig]
        default: null
        description: キャラクター参照設定（Director Reference）
        validation:
          # vibesとの併用不可
          mutex_with: vibes
      
      # --- プロンプト ---
      negative_prompt:
        type: Optional[str]
        default: null  # DEFAULT_NEGATIVEを使用
        description: ネガティブプロンプト
        validation:
          max_chars: 2000  # 文字数制限
      
      # --- 出力オプション ---
      save_path:
        type: Optional[Union[str, Path]]
        default: null
        description: 保存先ファイルパス
        validation: null
      
      save_dir:
        type: Optional[Union[str, Path]]
        default: null
        description: 保存先ディレクトリ（自動ファイル名）
        validation: null
      
      # --- 生成パラメータ ---
      model:
        type: str
        default: "nai-diffusion-4-5-full"
        description: モデル名
        validation:
          enum:
            - nai-diffusion-4-curated-preview
            - nai-diffusion-4-full
            - nai-diffusion-4-5-curated
            - nai-diffusion-4-5-full
      
      width:
        type: int
        default: 832
        description: 画像幅（ピクセル）
        validation:
          ge: 64
          le: 1024  # 1024*1024以下なら max width = 1024
          multiple_of: 64  # 64の倍数
          # Opusプラン: width * height <= 1024*1024 = 1,048,576 ピクセルでAnlas無料
          # 例: 832*1216 = 1,011,712 ピクセル → 無料
          max_pixels: 1048576
      
      height:
        type: int
        default: 1216
        description: 画像高さ（ピクセル）
        validation:
          ge: 64
          le: 1024  # 1024*1024以下なら max height = 1024（widthが64の場合は16384まで可能だが実用的ではない）
          multiple_of: 64
          # width * height <= 1,048,576 でクロスチェック
      
      steps:
        type: int
        default: 23
        description: 生成ステップ数
        validation:
          ge: 1
          le: 50  
      
      scale:
        type: float
        default: 5.0
        description: CFG Scale
        validation:
          ge: 0.0
          le: 10.0  # 最夤10
      
      seed:
        type: Optional[int]
        default: null  # ランダム生成
        description: シード値
        validation:
          ge: 0
          le: 4294967295  # 2^32 - 1
      
      sampler:
        type: str
        default: "k_euler_ancestral"
        description: サンプラー
        validation:
          enum:
            - k_euler
            - k_euler_ancestral
            - k_dpmpp_2s_ancestral
            - k_dpmpp_2m_sde
            - k_dpmpp_2m
            - k_dpmpp_sde
          # 表示名: Euler, Euler Ancestral, DPM++ 2S Ancestral, DPM++ 2M SDE, DPM++ 2M, DPM++ SDE
      
      noise_schedule:
        type: str
        default: "karras"
        description: ノイズスケジュール
        validation:
          enum:
            - native
            - karras
            - exponential
            - polyexponential
    
    returns:
      type: GenerateResult
      description: 生成結果

# =============================================================================
# プライベートメソッド（内部使用）
# =============================================================================

private_methods:
  
  _get_image_bytes:
    description: 画像データをバイトに変換
    parameters:
      image:
        type: Union[str, Path, bytes]
        description: 画像ソース
  
  _get_image_base64:
    description: 画像をBase64文字列に変換
    parameters:
      image:
        type: Union[str, Path, bytes]
        description: 画像ソース
  
  load_vibe_file:
    description: .naiv4vibeファイルを読み込む
    parameters:
      vibe_path:
        type: Union[str, Path]
        description: .naiv4vibeファイルのパス
  
  _extract_encoding:
    description: Vibeデータからエンコード情報を抽出
    parameters:
      vibe_data:
        type: dict
        description: パースされたVibeデータ
      model:
        type: str
        default: "nai-diffusion-4-5-full"
        description: モデル名
  
  _process_vibes:
    description: Vibeリストをエンコードリストに変換
    parameters:
      vibes:
        type: List[Union[str, Path, VibeEncodeResult]]
        description: Vibeリスト
      model:
        type: str
        description: モデル名
  
  _prepare_character_reference_image:
    description: |
      キャラクター参照画像を適切なサイズに変換
      API仕様: 1024x1536, 1536x1024, 1472x1472（黒パディング付き）
    parameters:
      image_bytes:
        type: bytes
        description: 元画像バイトデータ
  
  _process_character_references:
    description: キャラクター参照リストをAPI用パラメータに変換
    parameters:
      refs:
        type: List[CharacterReferenceConfig]
        description: キャラクター参照設定リスト

# =============================================================================
# 追加バリデーションルール（クロスフィールド）
# =============================================================================

cross_field_validations:
  
  - name: img2img_requires_source
    description: action="img2img" の場合は source_image が必須
    condition: action == "img2img"
    requires: source_image
  
  - name: vibes_mutex_character_reference
    description: vibes と character_reference は同時に使用不可
    mutex: [vibes, character_reference]
  
  - name: vibe_strengths_length
    description: vibe_strengths の長さは vibes と一致する必要がある
    condition: vibes is not null and vibe_strengths is not null
    check: len(vibe_strengths) == len(vibes)
  
  - name: vibe_info_extracted_length
    description: vibe_info_extracted の長さは vibes と一致する必要がある
    condition: vibes is not null and vibe_info_extracted is not null
    check: len(vibe_info_extracted) == len(vibes)
  
  - name: max_pixels
    description: width * height は最大ピクセル数を超えてはいけない
    check: width * height <= 4926336  # TODO: 正確な値を確認

